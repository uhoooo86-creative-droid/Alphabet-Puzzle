<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Big Cat Alphabet Puzzle</title>
<style>
:root {
  --cream:#fff8ef;
  --paper:#fffdf9;
  --coral:#f46b5f;
  --red:#e45b4c;
  --ink:#2d2d2d;
  --blue:#4a86d9;
  --line:#222;
  --shadow:0 10px 24px rgba(0,0,0,.10);
  --radius:24px;
}
* { box-sizing:border-box; }
body {
  margin:0; background:linear-gradient(180deg,#fff7ef 0%,#fff2e6 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--ink);
}
.app {
  max-width:980px; margin:0 auto; padding:16px 16px 32px;
}
.card {
  background:var(--paper); border:4px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow);
}
header.card {
  padding:16px 18px; margin-bottom:14px;
  display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
}
.title {
  display:flex; align-items:center; gap:12px;
}
.badge {
  width:56px; height:56px; border-radius:18px;
  background:linear-gradient(180deg,var(--coral),var(--red)); color:#fff;
  display:flex; align-items:center; justify-content:center; font-weight:900; font-size:28px;
  border:3px solid var(--line);
}
h1 { font-size:28px; margin:0; }
.sub { font-size:14px; opacity:.75; margin-top:4px; }

.controls {
  display:flex; gap:10px; flex-wrap:wrap;
}
button {
  border:3px solid var(--line); border-radius:18px; padding:12px 16px; font-size:17px;
  font-weight:800; background:#fff; cursor:pointer; box-shadow:0 4px 0 #222;
}
button:active { transform:translateY(2px); box-shadow:0 2px 0 #222; }
button.primary { background:linear-gradient(180deg,#ff8c73,#f46b5f); color:#fff; }
button.blue { background:linear-gradient(180deg,#79adff,#4a86d9); color:#fff; }
button.ghost { background:#fff9f3; }
button[disabled] { opacity:.45; cursor:not-allowed; }

.main {
  display:grid; grid-template-columns:1.1fr .9fr; gap:16px;
}
@media (max-width:860px) {
  .main { grid-template-columns:1fr; }
}

.panel { padding:16px; }

.image-box {
  background:#fff; border:4px solid var(--line); border-radius:24px; padding:10px;
}
.image-box img {
  width:100%; height:auto; display:block; border-radius:18px; background:#f7f7f7;
}

.info {
  display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; margin:14px 0 10px;
}
.big-letter {
  font-size:60px; font-weight:1000; line-height:1; color:var(--red);
}
.phrase {
  font-size:22px; font-weight:800; text-align:right;
}
.tip {
  padding:12px 14px; border-radius:18px; border:3px dashed var(--line); background:#fff6ed;
  font-size:15px; margin:8px 0 0;
}

.slot-row, .piece-row {
  display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
}

.slot {
  width:min(24vw,110px); height:min(24vw,110px); max-width:110px; max-height:110px;
  min-width:86px; min-height:86px;
  border-radius:22px; border:4px dashed #666; background:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:40px; font-weight:900; user-select:none;
}
.slot.filled {
  background:#fff1ea; border-style:solid; color:var(--red);
}

.piece {
  width:min(24vw,110px); height:min(24vw,110px); max-width:110px; max-height:110px;
  min-width:86px; min-height:86px; border-radius:22px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  border:4px solid var(--line); background:linear-gradient(180deg,#fffefb,#ffe5dc);
  box-shadow:0 6px 0 #222; user-select:none;
  font-size:34px; font-weight:1000;
}
.piece small { font-size:13px; opacity:.75; font-weight:800; }
.piece.selected { outline:6px solid #7fb0ff; transform:translateY(-3px); }
.piece.done { visibility:hidden; }

.progress {
  display:flex; gap:6px; flex-wrap:wrap; margin-top:16px;
}
.dot {
  width:20px; height:20px; border-radius:999px; border:3px solid var(--line); background:#fff;
}
.dot.done { background:var(--coral); }

.celebrate {
  margin-top:12px; padding:14px; border-radius:18px; border:3px solid var(--line);
  background:#fff7c8; font-weight:900; font-size:22px; text-align:center; min-height:62px;
}

.footer-note {
  font-size:13px; opacity:.7; text-align:center; margin-top:14px;
}
</style>
</head>
<body>
<div class="app">
  <header class="card">
    <div class="title">
      <div class="badge" id="headerBadge">A</div>
      <div>
        <h1>빅캣 알파벳 퍼즐</h1>
        <div class="sub">퍼즐을 맞추면 해당 알파벳 문장이 읽혀요.</div>
      </div>
    </div>
    <div class="controls">
      <button class="ghost" id="prevBtn">← 이전</button>
      <button class="blue" id="speakBtn">🔊 다시 듣기</button>
      <button class="primary" id="nextBtn">다음 →</button>
    </div>
  </header>

  <section class="main">
    <div class="card panel">
      <div class="image-box">
        <img id="letterImage" src="" alt="알파벳 캐릭터 이미지" />
      </div>
      <div class="info">
        <div class="big-letter" id="bigLetter">A</div>
        <div class="phrase" id="phraseText">All eyes on me.</div>
      </div>
      <div class="tip">모바일에서도 되도록 <b>끌기</b> 대신 <b>탭해서 맞추기</b> 방식으로 만들었어요. 아래 조각을 순서대로 눌러 보세요.</div>
      <div class="progress" id="progress"></div>
    </div>

    <div class="card panel">
      <div class="slot-row" id="slotRow"></div>
      <div class="piece-row" id="pieceRow" style="margin-top:16px;"></div>
      <div class="celebrate" id="celebrateBox">조각을 모두 맞춰 보세요!</div>
      <div class="footer-note">음성은 브라우저의 기본 음성 기능을 사용합니다. iPhone에서는 무음모드 해제 후 더 잘 들려요.</div>
    </div>
  </section>
</div>

<script>
const ITEMS = [{"letter": "A", "phrase": "All eyes on me.", "image": "assets/01.png"}, {"letter": "B", "phrase": "Brush your teeth!", "image": "assets/02.png"}, {"letter": "C", "phrase": "Careful!", "image": "assets/03.png"}, {"letter": "D", "phrase": "Do not run.", "image": "assets/04.png"}, {"letter": "E", "phrase": "Eat your veggies.", "image": "assets/05.png"}, {"letter": "F", "phrase": "Five more minutes.", "image": "assets/06.png"}, {"letter": "G", "phrase": "Got it?", "image": "assets/07.png"}, {"letter": "H", "phrase": "How many times?", "image": "assets/08.png"}, {"letter": "I", "phrase": "I’m watching you.", "image": "assets/09.png"}, {"letter": "J", "phrase": "Just one bite.", "image": "assets/10.png"}, {"letter": "K", "phrase": "Knock it off.", "image": "assets/11.png"}, {"letter": "L", "phrase": "Look at this. Who did it?", "image": "assets/12.png"}, {"letter": "M", "phrase": "Mommy will know.", "image": "assets/13.png"}, {"letter": "N", "phrase": "No.", "image": "assets/14.png"}, {"letter": "O", "phrase": "One more time.", "image": "assets/15.png"}, {"letter": "P", "phrase": "Perfect! Let’s do it!", "image": "assets/16.png"}, {"letter": "Q", "phrase": "Quiet.", "image": "assets/17.png"}, {"letter": "R", "phrase": "Really?", "image": "assets/18.png"}, {"letter": "S", "phrase": "Stop talking.", "image": "assets/19.png"}, {"letter": "T", "phrase": "Turn the page.", "image": "assets/20.png"}, {"letter": "U", "phrase": "Use your words.", "image": "assets/21.png"}, {"letter": "V", "phrase": "Veggies in your mouth!", "image": "assets/22.png"}, {"letter": "W", "phrase": "What did I just say?", "image": "assets/23.png"}, {"letter": "X", "phrase": "X marks the spot.", "image": "assets/24.png"}, {"letter": "Y", "phrase": "You again?", "image": "assets/25.png"}, {"letter": "Z", "phrase": "Zero patience left.", "image": "assets/26.png"}];
let index = 0;
let selectedPiece = null;
let fillCount = 0;
let completed = new Set();

const headerBadge = document.getElementById('headerBadge');
const letterImage = document.getElementById('letterImage');
const bigLetter = document.getElementById('bigLetter');
const phraseText = document.getElementById('phraseText');
const slotRow = document.getElementById('slotRow');
const pieceRow = document.getElementById('pieceRow');
const celebrateBox = document.getElementById('celebrateBox');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const speakBtn = document.getElementById('speakBtn');

function buildProgress() {
  progress.innerHTML = '';
  ITEMS.forEach((item, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (completed.has(i) ? ' done' : '');
    progress.appendChild(dot);
  });
}

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function speakCurrent() {
  const item = ITEMS[index];
  if (!window.speechSynthesis) return;
  const text = `${item.letter}. ${item.phrase}`;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.92;
  utter.pitch = 1.05;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

function celebrate() {
  completed.add(index);
  celebrateBox.textContent = `🎉 ${ITEMS[index].letter} - ${ITEMS[index].phrase}`;
  buildProgress();
  speakCurrent();
}

function renderPuzzle() {
  const item = ITEMS[index];
  headerBadge.textContent = item.letter;
  bigLetter.textContent = item.letter;
  phraseText.textContent = item.phrase;
  letterImage.src = item.image;
  letterImage.alt = `${item.letter} image`;
  celebrateBox.textContent = '조각을 모두 맞춰 보세요!';
  selectedPiece = null;
  fillCount = 0;
  slotRow.innerHTML = '';
  pieceRow.innerHTML = '';
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === ITEMS.length - 1;

  const targets = ['1','2','3'];
  targets.forEach((id) => {
    const slot = document.createElement('button');
    slot.className = 'slot';
    slot.type = 'button';
    slot.dataset.id = id;
    slot.textContent = '?';
    slot.addEventListener('click', () => {
      if (!selectedPiece || slot.classList.contains('filled')) return;
      if (selectedPiece.dataset.id === slot.dataset.id) {
        slot.classList.add('filled');
        slot.textContent = item.letter;
        selectedPiece.classList.add('done');
        selectedPiece.disabled = true;
        selectedPiece.classList.remove('selected');
        selectedPiece = null;
        fillCount += 1;
        if (fillCount === 3) celebrate();
      } else {
        celebrateBox.textContent = '앗! 다른 조각을 눌러 보세요.';
      }
    });
    slotRow.appendChild(slot);
  });

  shuffle(targets).forEach((id) => {
    const piece = document.createElement('button');
    piece.type = 'button';
    piece.className = 'piece';
    piece.dataset.id = id;
    piece.innerHTML = `<div>${item.letter}</div><small>piece ${id}</small>`;
    piece.addEventListener('click', () => {
      document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
      selectedPiece = piece;
      piece.classList.add('selected');
      celebrateBox.textContent = `조각 ${id} 선택! 맞는 자리를 눌러 주세요.`;
    });
    pieceRow.appendChild(piece);
  });

  buildProgress();
}

prevBtn.addEventListener('click', () => {
  if (index > 0) { index -= 1; renderPuzzle(); }
});
nextBtn.addEventListener('click', () => {
  if (index < ITEMS.length - 1) { index += 1; renderPuzzle(); }
});
speakBtn.addEventListener('click', speakCurrent);

window.addEventListener('load', () => {
  renderPuzzle();
  setTimeout(() => {
    // iOS often needs a user gesture later, so this is just a soft try.
    // The manual 다시 듣기 button is the reliable path.
  }, 300);
});
</script>
</body>
</html>
